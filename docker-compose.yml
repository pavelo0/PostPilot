services:
  redis:
    image: redis:7-alpine
    container_name: postpilot-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - postpilot_redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 5

  postgres:
    image: postgres:16-alpine
    container_name: postpilot-postgres
    restart: unless-stopped
    ports:
      - '5433:5432'
    environment:
      POSTGRES_USER: postpilot
      POSTGRES_PASSWORD: postpilot
      POSTGRES_DB: postpilot
    volumes:
      - postpilot_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postpilot -d postpilot']
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postpilot_pg_data:
  postpilot_redis_data:
