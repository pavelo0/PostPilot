databases:
  - name: postpilot-db
    plan: free
    databaseName: postpilot
    user: postpilot

services:
  - type: web
    name: postpilot-api
    runtime: node
    rootDir: api
    plan: free
    buildCommand: npm ci --include=dev && npm run build
    startCommand: npx prisma migrate deploy && node dist/src/main
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: BOT_TOKEN_ENCRYPTION_KEY
        generateValue: true
      - key: EXPOSE_EMAIL_VERIFICATION_CODE
        value: 'false'
      - key: LOG_EMAIL_VERIFICATION_CODE
        value: 'false'
      - key: DEFAULT_SUBSCRIPTION_PLAN
        value: basic
      - key: DATABASE_URL
        fromDatabase:
          name: postpilot-db
          property: connectionString
