databases:
  - name: postpilot-db
    plan: free
    databaseName: postpilot
    user: postpilot

services:
  - type: web
    name: postpilot-api
    runtime: node
    rootDir: api
    plan: free
    buildCommand: npm ci --include=dev && npm run build
    startCommand: npx prisma migrate deploy && node dist/src/main
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: BOT_TOKEN_ENCRYPTION_KEY
        generateValue: true
      - key: EXPOSE_EMAIL_VERIFICATION_CODE
        value: 'false'
      - key: LOG_EMAIL_VERIFICATION_CODE
        value: 'false'
      - key: REDIS_URL
        sync: false
      - key: MEDIA_STORAGE
        value: s3
      - key: S3_BUCKET
        sync: false
      - key: S3_ENDPOINT
        sync: false
      - key: S3_ACCESS_KEY_ID
        sync: false
      - key: S3_SECRET_ACCESS_KEY
        sync: false
      - key: S3_REGION
        value: auto
      - key: RESEND_API_KEY
        sync: false
      - key: EMAIL_FROM
        sync: false
      - key: APP_PUBLIC_URL
        sync: false
      - key: DEFAULT_SUBSCRIPTION_PLAN
        value: basic
      - key: DATABASE_URL
        fromDatabase:
          name: postpilot-db
          property: connectionString

  - type: worker
    name: postpilot-worker
    runtime: node
    rootDir: api
    plan: starter
    buildCommand: npm ci --include=dev && npm run build
    startCommand: node dist/src/worker/main.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: BOT_TOKEN_ENCRYPTION_KEY
        fromService:
          type: web
          name: postpilot-api
          envVarKey: BOT_TOKEN_ENCRYPTION_KEY
      - key: REDIS_URL
        sync: false
      - key: MEDIA_STORAGE
        value: s3
      - key: S3_BUCKET
        sync: false
      - key: S3_ENDPOINT
        sync: false
      - key: S3_ACCESS_KEY_ID
        sync: false
      - key: S3_SECRET_ACCESS_KEY
        sync: false
      - key: S3_REGION
        value: auto
      - key: DATABASE_URL
        fromDatabase:
          name: postpilot-db
          property: connectionString
